server:
  port: 8080
spring:
  cloud:
    compatibility-verifier:
      enabled: false # lab 16: disable version check
  application:
    name: "orders" # this is the endpoint
  profiles:
    active: "prod"
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password: ''
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  config:
   import: "configserver:http://localhost:8071/" # lab 16: config server port 8071